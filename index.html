// 1. DECODIFICADOR DE TAG (Formato XX.XX.XXX)
// ============================================================
const decodeTag = (tag) => {
    const regionMap = { 'RM': 'Metropolitana', 'V': 'Valparaíso', 'VI': "O'Higgins" };
    const plantaMap = { 
        '14': 'Casa Matriz (14 de la fama)', 
        'BM': 'BME La Vara 3310', 
        'PI': 'Planta Industrial (La Vara 2700)', 
        'RA': 'Rancagua', 
        'VM': 'Viña del Mar' 
    };
    
    const parts = tag.split('.');
    if (parts.length !== 3) return { raw: tag, region: 'Desconocido', planta: 'Desconocida', correlativo: tag, ubicacionCompleta: 'Ubicación no disponible' };
    
    const [regionCode, plantaCode, correlativo] = parts;
    const region = regionMap[regionCode] || regionCode;
    const planta = plantaMap[plantaCode] || plantaCode;
    
    return { raw: tag, region, planta, correlativo, ubicacionCompleta: `${region} - ${planta}` };
};

            <div class="fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur-lg border-t border-slate-700 py-2 px-4 flex justify-around items-center max-w-md mx-auto rounded-t-3xl z-40">
                <button class="navBtn flex flex-col items-center p-2 rounded-xl transition" data-tab="dashboard">
                    <i data-lucide="server" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-0.5">Dashboard</span>
                </button>
                <button id="fabScanBtn" class="flex flex-col items-center p-2 bg-cyan-600 rounded-full w-14 h-14 -mt-8 shadow-xl active:scale-95 transition">
                    <i data-lucide="qrcode" class="w-7 h-7 mt-2.5"></i>
                    <span class="text-[9px] -mt-1">Escanear</span>
                </button>
                <button class="navBtn flex flex-col items-center p-2 rounded-xl transition" data-tab="informes">
                    <i data-lucide="file-text" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-0.5">Informes</span>
                </button>
                <button class="navBtn flex flex-col items-center p-2 rounded-xl transition" data-tab="ajustes">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                    <span class="text-[10px] mt-0.5">Ajustes</span>
                </button>
            </div>
        </div>
    `;
    
    root.innerHTML = html;
    lucide.createIcons();
    attachEvents();
}

// ============================================================
// 4. MANEJADORES DE EVENTOS
// ============================================================
function attachEvents() {
    // LOTO
    const acceptBtn = document.getElementById('acceptLotoBtn');
    if (acceptBtn) acceptBtn.onclick = () => { state.lotoAccepted = true; render(); };
    
    // Navegación inferior
    document.querySelectorAll('.navBtn').forEach(btn => {
        btn.onclick = () => { state.activeTab = btn.dataset.tab; render(); };
    });
    
    // Botón flotante escanear
    const fabScan = document.getElementById('fabScanBtn');
    if (fabScan) fabScan.onclick = () => handleScan();
    
    const scanEmpty = document.getElementById('scanQrEmptyBtn');
    if (scanEmpty) scanEmpty.onclick = () => handleScan();
    
    // Seleccionar equipo desde informes
    document.querySelectorAll('.selectEquipoBtn').forEach(btn => {
        btn.onclick = () => {
            const tag = btn.dataset.tag;
            if (equiposDB[tag]) {
                state.currentTag = tag;
                state.currentEquipo = equiposDB[tag];
                state.historial = historialDB[tag] || [];
                state.activeTab = 'dashboard';
                window.history.pushState({}, '', `?tag=${tag}`);
                render();
            }
        };
    });
    
    // Login avanzado
    const advancedBtn = document.getElementById('advancedLoginBtn');
    if (advancedBtn) advancedBtn.onclick = () => {
        const pwd = prompt("🔐 Ingrese Clave de Ingeniería SYM:");
        if (pwd === "SYM2025") {
            state.userProfile = 'advanced';
            showToast("Acceso Avanzado concedido", "success");
            render();
        } else if (pwd) showToast("Clave incorrecta", "error");
    };
    
    // Editar observaciones
    const editObsBtn = document.getElementById('editObservacionesBtn');
    if (editObsBtn) editObsBtn.onclick = () => {
        const newObs = prompt("Editar observaciones técnicas:", state.currentEquipo.observaciones);
        if (newObs !== null && state.currentEquipo) {
            state.currentEquipo.observaciones = newObs;
            equiposDB[state.currentTag].observaciones = newObs;
            showToast("Observación actualizada", "success");
            render();
        }
    };
    
    // Editar equipo completo (formulario simplificado)
    const editEquipoBtn = document.getElementById('editCurrentEquipoBtn');
    if (editEquipoBtn) editEquipoBtn.onclick = () => {
        if (state.currentEquipo) {
            const nuevosDatos = prompt("Editar datos (formato: campo=valor)\nEjemplo: estado=EN FALLA", 
                `estado=${state.currentEquipo.estado}\nobservaciones=${state.currentEquipo.observaciones?.substring(0,50)}`);
            if (nuevosDatos && nuevosDatos.includes('=')) {
                const [campo, valor] = nuevosDatos.split('=');
                if (campo && valor && state.currentEquipo[campo] !== undefined) {
                    state.currentEquipo[campo] = valor;
                    equiposDB[state.currentTag][campo] = valor;
                    showToast(`${campo} actualizado a: ${valor}`, "success");
                    render();
                }
            }
        }
    };
    
    // Crear nuevo equipo
    const createBtn = document.getElementById('createNewEquipoBtn');
    if (createBtn) createBtn.onclick = () => {
        const newTag = prompt("Ingrese nuevo TAG (formato XX.XX.XXX):");
        if (newTag && !equiposDB[newTag]) {
            const newNombre = prompt("Nombre del equipo:");
            if (newNombre) {
                equiposDB[newTag] = {
                    tag: newTag, nombre: newNombre, estado: 'OPERATIVO',
                    marca: '-', modelo: '-', serie: '-', capacidad: '-',
                    lugarInstalacion: '-', drenaje: '-', refrigerante: '-',
                    alimentacion: '-', ultimoMantenimiento: new Date().toISOString().slice(0,10),
                    proximoMantenimiento: '-', observaciones: 'Equipo nuevo registrado',
                    manualUrl: '#', fichaTecnica: '#', informeServicio: '#'
                };
                historialDB[newTag] = [{
                    id: 1, fecha: new Date().toLocaleString(), usuario: 'ingenieria',
                    accion: 'Equipo creado en sistema', tipo: 'admin'
                }];
                state.currentTag = newTag;
                state.currentEquipo = equiposDB[newTag];
                state.historial = historialDB[newTag];
                state.activeTab = 'dashboard';
                window.history.pushState({}, '', `?tag=${newTag}`);
                showToast(`Equipo ${newTag} creado`, "success");
                render();
            }
        } else if (newTag) showToast("El TAG ya existe", "error");
    };
    
    // Generar QR (simulado)
    const genQrBtn = document.getElementById('generateQrBtn');
    if (genQrBtn) genQrBtn.onclick = () => {
        const tag = state.currentTag || "NUEVO-EQUIPO";
        showToast(`Generando etiqueta PDF 8x5cm para: ${tag}`, "info");
        // Simulación de descarga
        alert("✅ En producción: Se generaría un PDF con código QR para:\n" + tag + "\nFormato 8x5cm, 300 DPI");
    };
}

// ============================================================
// 5. FUNCIONES AUXILIARES
// ============================================================
function handleScan() {
    const mockTag = prompt("📷 Escanear QR o ingresar TAG manualmente:\nEjemplo: RM.14.001");
    if (mockTag && equiposDB[mockTag]) {
        state.currentTag = mockTag;
        state.currentEquipo = equiposDB[mockTag];
        state.historial = historialDB[mockTag] || [];
        state.activeTab = 'dashboard';
        window.history.pushState({}, '', `?tag=${mockTag}`);
        showToast(`Equipo ${mockTag} cargado`, "success");
        render();
    } else if (mockTag) {
        showToast("Equipo no encontrado en la base de datos", "error");
    }
}

function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    const bgColor = type === 'success' ? 'bg-emerald-600' : (type === 'error' ? 'bg-red-600' : 'bg-slate-700');
    toast.className = `${bgColor} text-white px-5 py-3 rounded-2xl shadow-2xl text-sm font-medium fixed top-5 left-1/2 -translate-x-1/2 z-50 transition-all duration-300`;
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
}

// ============================================================
// 6. INICIALIZACIÓN Y PARÁMETRO URL
// ============================================================
function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const tagParam = urlParams.get('tag');
    if (tagParam && equiposDB[tagParam]) {
        state.currentTag = tagParam;
        state.currentEquipo = equiposDB[tagParam];
        state.historial = historialDB[tagParam] || [];
    }
    render();
}

init();
</script>
