<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-slate-100">
<div id="root" class="max-w-md mx-auto relative min-h-screen"></div>

<script>
// ============================================================
// 1. DECODIFICADOR DE TAG
// ============================================================
const decodeTag = (tag) => {
    const regionMap = { 'RM': 'Metropolitana', 'V': 'Valparaíso', 'VI': "O'Higgins" };
    const plantaMap = { '14': 'Casa Matriz (14 de la fama)', 'BM': 'BME La Vara 3310', 'PI': 'Planta Industrial (La Vara 2700)', 'RA': 'Rancagua', 'VM': 'Viña del Mar' };
    const parts = tag.split('.');
    if (parts.length !== 3) return { raw: tag, region: 'Desconocido', planta: 'Desconocida', correlativo: tag, ubicacionCompleta: 'Ubicación no disponible' };
    const [regionCode, plantaCode, correlativo] = parts;
    const region = regionMap[regionCode] || regionCode;
    const planta = plantaMap[plantaCode] || plantaCode;
    return { raw: tag, region, planta, correlativo, ubicacionCompleta: `${region} - ${planta}` };
};

const getRegionFromTag = (tag) => {
    const parts = tag.split('.');
    if (parts.length !== 3) return 'Desconocido';
    const regionMap = { 'RM': 'Metropolitana', 'V': 'Valparaíso', 'VI': "O'Higgins" };
    return regionMap[parts[0]] || parts[0];
};

// ============================================================

// ============================================================
// 4. FUNCIONES DE MÉTRICAS
// ============================================================
function calcularMetricas() { 
    const e = Object.values(equiposDB); 
    return { total: e.length, operativos: e.filter(eq=>eq.estado==='OPERATIVO').length, falla: e.filter(eq=>eq.estado==='EN FALLA').length, observaciones: e.filter(eq=>eq.estado==='Con Observaciones').length }; 
}

function calcularMTBF(tag) { 
    const fallas = (eventLogDB[tag] || []).filter(h => h.accion === 'CAMBIO_ESTADO' && h.estadoNuevo === 'EN FALLA').length;
    if (fallas === 0) return 180;
    return Math.round(180 / fallas);
}

function calcularMTTR(tag) { 
    const resueltos = (eventLogDB[tag] || []).filter(h => h.accion === 'CAMBIO_ESTADO' && h.estadoNuevo === 'OPERATIVO');
    if (resueltos.length === 0) return 2.5;
    return Math.round((4 / resueltos.length) * 10) / 10;
}

function calcularDisponibilidad(mtbf, mttr) { 
    if (!mtbf || !mttr) return 98.5; 
    return Math.round((mtbf / (mtbf + mttr)) * 100 * 10) / 10; 
}

function calcularRatioMantenimiento() {
    let preventivos = Object.values(equiposDB).filter(e => e.tipoServicio?.toLowerCase().includes('preventivo') || e.estado === 'OPERATIVO').length;
    let correctivos = Object.values(equiposDB).filter(e => e.tipoServicio?.toLowerCase().includes('correctivo') || e.estado === 'EN FALLA').length;
    const total = preventivos + correctivos;
    return { preventivos: total > 0 ? Math.round((preventivos / total) * 100) : 80, correctivos: total > 0 ? Math.round((correctivos / total) * 100) : 20 };
}

function calcularTendencia() {
    return { tendencia: '→', color: 'text-yellow-400', mensaje: 'Estable', bg: 'bg-yellow-950/30' };
}

function calcularCumplimiento() { 
    const conManto = Object.values(equiposDB).filter(e => e.ultimoMantenimiento && e.ultimoMantenimiento !== '-').length; 
    return Math.round((conManto / Object.keys(equiposDB).length) * 100); 
}

function equiposMantenimientoVencido() { 
    const hoy = new Date(); 
    return Object.values(equiposDB).filter(e => e.proximoMantenimiento && e.proximoMantenimiento !== '-' && new Date(e.proximoMantenimiento) < hoy); 
}

function obtenerAlertasCriticas() {
    const vencidos = equiposMantenimientoVencido();
    const falla = Object.values(equiposDB).filter(e => e.estado === 'EN FALLA');
    const alertas = [];
    if(vencidos.length) alertas.push({ tipo:'⚠️', mensaje:`${vencidos.length} equipo(s) con mantenimiento vencido`, color:'text-red-400' });
    if(falla.length) alertas.push({ tipo:'🔴', mensaje:`${falla.length} equipo(s) en estado de FALLA`, color:'text-red-400' });
    return alertas;
}

// ============================================================
// 5. FUNCIONES DE LOG Y CAMBIO DE ESTADO
// ============================================================
function agregarEventoLog(tag, accion, detalle, estadoAnterior, estadoNuevo, opciones = {}) {
    if (!eventLogDB[tag]) eventLogDB[tag] = [];
    if (!nextEventId[tag]) nextEventId[tag] = 1;
    
    const ahora = new Date();
    const timestamp = ahora.toLocaleString('es-CL');
    
    eventLogDB[tag].unshift({
        id: nextEventId[tag]++,
        timestamp: timestamp,
        usuario: state.userProfile === 'advanced' ? 'ingenieria_sym' : (opciones.usuario || 'tecnico'),
        accion: accion,
        detalle: detalle,
        estadoAnterior: estadoAnterior,
        estadoNuevo: estadoNuevo,
        prioridad: opciones.prioridad || (accion === 'CAMBIO_ESTADO' && estadoNuevo === 'EN FALLA' ? 'Crítica' : 'Media'),
        categoria: opciones.categoria || 'Operacional',
        impactoProduccion: opciones.impactoProduccion || 0
    });
    
    if (eventLogDB[tag].length > 50) eventLogDB[tag] = eventLogDB[tag].slice(0, 50);
}

function agregarAlHistorial(tag, accion, usuario, tipo = 'admin') {
    if (!historialDB[tag]) historialDB[tag] = [];
    if (!nextHistorialId[tag]) nextHistorialId[tag] = 1;
    
    const ahora = new Date();
    const fecha = ahora.toLocaleString('es-CL');
    
    historialDB[tag].unshift({
        id: nextHistorialId[tag]++,
        fecha: fecha,
        usuario: usuario,
        accion: accion,
        tipo: tipo
    });
}

function cambiarEstadoEquipo(nuevoEstado) {
    if (!state.currentEquipo) return;
    const anterior = state.currentEquipo.estado;
    if (anterior === nuevoEstado) return;
    
    state.currentEquipo.estado = nuevoEstado;
    equiposDB[state.currentTag].estado = nuevoEstado;
    
    agregarEventoLog(state.currentTag, 'CAMBIO_ESTADO', `Cambio de estado: ${anterior} → ${nuevoEstado}`, anterior, nuevoEstado, { prioridad: nuevoEstado === 'EN FALLA' ? 'Crítica' : 'Media' });
    agregarAlHistorial(state.currentTag, `Cambio de estado: ${anterior} → ${nuevoEstado}`, state.userProfile === 'advanced' ? 'ingenieria_sym' : 'tecnico', 'admin');
    
    state.historial = historialDB[state.currentTag] || [];
    
    showToast(`✅ Estado cambiado a: ${nuevoEstado}`, 'success');
    render();
}

    document.getElementById('cancelarModalBtn')?.addEventListener('click', close);
    document.getElementById('confirmarEstadoBtn')?.addEventListener('click', () => { cambiarEstadoEquipo(document.getElementById('estadoSelect').value); close(); });
}

// ============================================================

function showToast(msg, type) { 
    const toast = document.createElement('div'); 
    toast.className = `${type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'} text-white px-5 py-3 rounded-2xl text-sm fixed top-5 left-1/2 -translate-x-1/2 z-50 shadow-2xl`; 
    toast.innerText = msg; 
    document.body.appendChild(toast); 
    setTimeout(() => toast.remove(), 3000); 
}

    const filtrados = estado ? Object.values(equiposDB).filter(e => e.estado === estado) : Object.values(equiposDB);
    if (!filtrados.length) { showToast(`No hay equipos para mostrar`, 'info'); return; }
    
    const modal = document.createElement('div'); 
    modal.className = 'fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4';
    modal.innerHTML = `<div class="bg-slate-800 rounded-2xl max-w-md w-full max-h-[85vh] flex flex-col border border-slate-600 shadow-2xl modal-content">

            <button id="closeListaModalBtn" class="p-1 rounded-full bg-slate-700 hover:bg-slate-600">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto p-3 space-y-2">
            ${filtrados.map(eq => `<div class="equipo-lista-item bg-slate-700/50 rounded-xl p-3 cursor-pointer hover:bg-slate-600 transition-all" data-tag="${eq.tag}">

    </div>`;
    
    document.body.appendChild(modal); 
    lucide.createIcons();
    
    const close = () => modal.remove();
    document.getElementById('closeListaModalBtn')?.addEventListener('click', close);
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
    document.querySelectorAll('.equipo-lista-item').forEach(item => {
        item.addEventListener('click', () => { const tag = item.dataset.tag; if (tag && equiposDB[tag]) { selectEquipo(tag); close(); } });
    });
}

// ============================================================
// 7. FUNCIONES DE INVENTARIO Y EXCEL
// ============================================================
let informeFiltros = { tipo: 'TODO', valor: '' };

function obtenerEquiposFiltrados() {
    let eqs = Object.values(equiposDB);
    if (informeFiltros.tipo === 'TODO' || !informeFiltros.valor) return eqs;
    const v = informeFiltros.valor.toLowerCase();
    switch (informeFiltros.tipo) {
        case 'TAG_ID': return eqs.filter(e => e.tag.toLowerCase().includes(v));
        case 'REGION': return eqs.filter(e => getRegionFromTag(e.tag).toLowerCase().includes(v));
        case 'UBICACIÓN': return eqs.filter(e => e.lugarInstalacion.toLowerCase().includes(v));
        case 'MARCA': return eqs.filter(e => e.marca.toLowerCase().includes(v));
        case 'ESTADO': return eqs.filter(e => e.estado.toLowerCase().includes(v));
        default: return eqs;
    }
}

function exportarInventarioExcel() {
    const datos = obtenerEquiposFiltrados().map(e => ({ 'TAG_ID': e.tag, 'REGIÓN': getRegionFromTag(e.tag), 'UBICACIÓN': e.lugarInstalacion, 'MARCA': e.marca, 'MODELO': e.modelo, 'ESTADO': e.estado, 'CAPACIDAD_BTU': e.capacidad }));
    const ws = XLSX.utils.json_to_sheet(datos); 
    const wb = XLSX.utils.book_new(); 
    XLSX.utils.book_append_sheet(wb, ws, "Inventario_Equipos"); 
    XLSX.writeFile(wb, `inventario_${new Date().toISOString().slice(0, 10)}.xlsx`); 
    showToast(`📥 Exportados ${datos.length} equipos`, 'success');
}

function renderInventario() {
    const filtrados = obtenerEquiposFiltrados();
    return `<div class="bg-slate-800/80 rounded-2xl p-4 border border-slate-700">
        <div class="flex justify-between items-center mb-4"><h2 class="font-bold text-lg"><i data-lucide="clipboard-list" class="w-5 h-5 inline"></i> Inventario de Equipos</h2><button id="exportarInventarioBtn" class="text-xs bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded-xl">Exportar Excel</button></div>
        <div class="mb-4 flex gap-2"><select id="filtroTipo" class="flex-1 bg-slate-700 rounded-xl p-2 text-sm"><option value="TODO">TODO</option><option value="TAG_ID">TAG_ID</option><option value="REGION">REGION</option><option value="UBICACIÓN">UBICACIÓN</option><option value="MARCA">MARCA</option><option value="ESTADO">ESTADO</option></select><input type="text" id="filtroValor" placeholder="Buscar..." class="flex-2 bg-slate-700 rounded-xl p-2 text-sm"><button id="limpiarFiltrosBtn" class="bg-slate-700 px-3 rounded-xl"><i data-lucide="x" class="w-4 h-4"></i></button></div>
        <div class="table-scroll"><table class="w-full text-sm"><thead class="bg-slate-700/50"><tr><th class="p-2 text-left">TAG</th><th class="p-2 text-left">REGIÓN</th><th class="p-2 text-left">UBICACIÓN</th><th class="p-2 text-left">MARCA</th><th class="p-2 text-left">ESTADO</th><th class="p-2 text-left">CAPACIDAD</th></tr></thead>
        <tbody>${filtrados.map(e => `<tr class="equipo-row cursor-pointer hover:bg-slate-700/30" data-tag="${e.tag}"><td class="p-2 font-mono text-xs">${e.tag}</td><td class="p-2 text-xs">${getRegionFromTag(e.tag)}</td><td class="p-2 text-xs">${(e.lugarInstalacion || '').substring(0, 20)}</td><td class="p-2 text-xs">${e.marca}</td><td class="p-2"><span class="estado-badge estado-${e.estado === 'OPERATIVO' ? 'operativo' : e.estado === 'EN FALLA' ? 'falla' : e.estado === 'MANTENIMIENTO' ? 'mantenimiento' : 'observacion'}">${e.estado}</span></td><td class="p-2 text-xs">${e.capacidad}</td></tr>`).join('')}</tbody></table></div>
    </div>`;
}

// ============================================================
// 8. FUNCIONES DE QR SCANNER CON VERIFICACIÓN DE PIN
// ============================================================
let html5QrCode = null;
let pendingQrTag = null;

function verificarPinYRedirigir(tag) {
    const pinIngresado = prompt("🔐 Acceso al sistema - Ingrese PIN de seguridad:");
    if (pinIngresado === "1234") {
        state.isAuthenticated = true;
        state.lotoAccepted = true;
        selectEquipo(tag);
        render();
        showToast(`✅ Acceso concedido - Cargando equipo ${tag}`, 'success');
    } else {
        showToast("❌ PIN incorrecto. Acceso denegado.", 'error');
        // Limpiar el tag pendiente
        pendingQrTag = null;
    }
}

function abrirScannerQR() {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4';
    modal.innerHTML = `<div class="bg-slate-800 rounded-2xl max-w-md w-full border border-slate-600 shadow-2xl modal-content">
        <div class="p-4 border-b border-slate-700 flex justify-between items-center"><h3 class="text-lg font-bold"><i data-lucide="camera"></i> Escanear QR</h3><button id="closeScannerBtn" class="p-1 rounded-full bg-slate-700">✕</button></div>
        <div id="qr-reader" class="p-4"></div><div class="p-4 text-center text-xs text-slate-400">Alinea el código QR del equipo</div>
    </div>`;
    document.body.appendChild(modal);
    lucide.createIcons();
    
    const closeModal = () => { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().catch(console.warn); modal.remove(); };
    document.getElementById('closeScannerBtn').addEventListener('click', closeModal);
    
    html5QrCode = new Html5Qrcode("qr-reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
        if (decodedText && equiposDB[decodedText]) { 
            closeModal();
            if (state.isAuthenticated && state.lotoAccepted) {
                selectEquipo(decodedText);
                showToast(`✅ Equipo ${decodedText} cargado`, 'success');
            } else {
                verificarPinYRedirigir(decodedText);
            }
        } else { 
            showToast(`❌ QR no válido o equipo no registrado`, 'error'); 
            closeModal(); 
        }
    }, (err) => { console.warn(err); });
}

function handleScan() { 
    if (!state.isAuthenticated) {
        const pin = prompt("🔐 Acceso al sistema - Ingrese PIN de seguridad primero:");
        if (pin === "1234") {
            state.isAuthenticated = true;
            state.lotoAccepted = true;
            showToast("✅ Acceso concedido. Ahora puede escanear.", 'success');
            render();
            abrirScannerQR();
        } else {
            showToast("❌ PIN incorrecto", 'error');
        }
    } else {
        abrirScannerQR();
    }
}

function agregarObservacionConLog(nuevaObs, prioridad = 'Media', categoria = 'Inspección') {
    if (!state.currentEquipo) return;
    
    if (!state.currentEquipo.observacionesDetalladas) state.currentEquipo.observacionesDetalladas = [];
    state.currentEquipo.observacionesDetalladas.unshift({
        texto: nuevaObs,
        fecha: new Date().toLocaleString('es-CL'),
        usuario: state.userProfile === 'advanced' ? 'ingenieria_sym' : 'tecnico',
        resueltoPor: '',
        estado: 'pendiente',
        prioridad: prioridad,
        categoria: categoria
    });
    
    agregarEventoLog(state.currentTag, 'OBSERVACIÓN', `Nueva observación: ${nuevaObs.substring(0, 100)}`, state.currentEquipo.estado, state.currentEquipo.estado, { prioridad: prioridad, categoria: categoria });
    agregarAlHistorial(state.currentTag, `Observación agregada: ${nuevaObs.substring(0, 50)}`, state.userProfile === 'advanced' ? 'ingenieria_sym' : 'tecnico', 'inspeccion');
    
    state.historial = historialDB[state.currentTag] || [];
    showToast(`✅ Observación agregada`, 'success');
    render();
}

function attachEvents() {
    document.querySelectorAll('.navBtn').forEach(btn => btn.addEventListener('click', () => { state.activeTab = btn.dataset.tab; render(); }));
    document.getElementById('fabScanBtn')?.addEventListener('click', () => handleScan());
    document.getElementById('scanQrEmptyBtn')?.addEventListener('click', () => handleScan());
    
    document.getElementById('advancedLoginBtn')?.addEventListener('click', () => { 
        const pwd = prompt("Clave Ingeniería SYM:"); 
        if (pwd === "SYM2025") { state.userProfile = 'advanced'; showToast("Acceso Avanzado concedido", 'success'); render(); } 
        else if (pwd) showToast("Clave incorrecta", 'error'); 
    });
    
    document.querySelectorAll('.metric-card').forEach(card => {
        card.addEventListener('click', () => {
            const estado = card.dataset.estado;
            if (card.dataset.metrica === 'total') mostrarEquiposPorEstado(null, 'Todos los Equipos', 'bg-cyan-500/20');
            else if (estado === 'OPERATIVO') mostrarEquiposPorEstado('OPERATIVO', 'Equipos Operativos', 'bg-green-500/20');
            else if (estado === 'EN FALLA') mostrarEquiposPorEstado('EN FALLA', 'Equipos en Falla', 'bg-red-500/20');
            else if (estado === 'Con Observaciones') mostrarEquiposPorEstado('Con Observaciones', 'Equipos con Observaciones', 'bg-blue-500/20');
        });
    });
    
    // Eventos de inventario
    const filtroTipo = document.getElementById('filtroTipo');
    const filtroValor = document.getElementById('filtroValor');
    const limpiar = document.getElementById('limpiarFiltrosBtn');
    const exportar = document.getElementById('exportarInventarioBtn');
    
    if (filtroTipo) filtroTipo.addEventListener('change', (e) => { informeFiltros.tipo = e.target.value; render(); });
    if (filtroValor) filtroValor.addEventListener('input', (e) => { informeFiltros.valor = e.target.value; render(); });
    if (limpiar) limpiar.addEventListener('click', () => { informeFiltros.tipo = 'TODO'; informeFiltros.valor = ''; render(); });
    if (exportar) exportar.addEventListener('click', () => exportarInventarioExcel());
    
    document.querySelectorAll('.equipo-row').forEach(row => {
        row.addEventListener('click', () => { const tag = row.dataset.tag; if (tag && equiposDB[tag]) selectEquipo(tag); });
    });
    
    document.getElementById('cambiarEstadoBtn')?.addEventListener('click', () => mostrarModalEstado());
    
    document.getElementById('agregarObservacionBtn')?.addEventListener('click', () => {
        const nuevaObs = prompt("Nueva observación técnica:");
        if (nuevaObs && nuevaObs.trim()) {
            const prioridad = prompt("Prioridad (Crítica/Alta/Media/Baja):", "Media");
            const categoria = prompt("Categoría:", "Inspección");
            agregarObservacionConLog(nuevaObs.trim(), prioridad || 'Media', categoria || 'Inspección');
        }
    });
    
    document.getElementById('editObservacionesBtn')?.addEventListener('click', () => {
        if (state.currentEquipo) {
            const newObs = prompt("Editar observaciones generales:", state.currentEquipo.observaciones);
            if (newObs && newObs !== state.currentEquipo.observaciones) {
                state.currentEquipo.observaciones = newObs;
                agregarEventoLog(state.currentTag, 'EDICIÓN', 'Observación general actualizada', state.currentEquipo.estado, state.currentEquipo.estado);
                agregarAlHistorial(state.currentTag, `Observación general actualizada`, state.userProfile === 'advanced' ? 'ingenieria_sym' : 'tecnico', 'admin');
                state.historial = historialDB[state.currentTag] || [];
                showToast("Observación actualizada", 'success');
                render();
            }
        }
    });
    
    document.getElementById('createNewEquipoBtn')?.addEventListener('click', () => {
        const newTag = prompt("Nuevo TAG (ej: RM.14.002):");
        if (newTag && !equiposDB[newTag]) {
            equiposDB[newTag] = {
                tag: newTag, nombre: "Nuevo Equipo", estado: "OPERATIVO", marca: "-", modelo: "-", serie: "-",
                capacidad: "-", lugarInstalacion: "-", drenaje: "-", refrigerante: "-", alimentacion: "-",
                ultimoMantenimiento: new Date().toISOString().slice(0, 10), proximoMantenimiento: "-",
                observaciones: "Equipo creado", manualUrl: "#", fichaTecnica: "#", informeServicio: "#",
                tipoServicio: "Mantenimiento", observacionesDetalladas: []
            };
            agregarEventoLog(newTag, 'CREACIÓN', 'Equipo creado', null, 'OPERATIVO');
            agregarAlHistorial(newTag, 'Equipo creado en sistema', 'ingenieria_sym', 'admin');
            selectEquipo(newTag);
            showToast(`Equipo ${newTag} creado`, 'success');
        } else if (newTag) showToast("TAG ya existe", 'error');
    });
    
    document.getElementById('generateQrBtn')?.addEventListener('click', () => alert("PDF QR generado (simulado)"));
    document.getElementById('downloadPlantillaBtn')?.addEventListener('click', () => {
        const ws = XLSX.utils.json_to_sheet([{ "TAG_ID": "RM.14.002", "MARCA": "Daikin", "MODELO": "FFQ35", "ESTADO": "OPERATIVO" }]);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Plantilla"); XLSX.writeFile(wb, "plantilla_nbyb.xlsx");
        showToast("Plantilla descargada", 'success');
    });
    
    const excelInput = document.getElementById('excelUploadInput');
    if (excelInput) {
        excelInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const wb = XLSX.read(ev.target.result, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    let importados = 0;
                    rows.forEach(row => {
                        const tagId = row.TAG_ID;
                        if (tagId && !equiposDB[tagId]) {
                            equiposDB[tagId] = {
                                tag: tagId, nombre: `${row.MARCA || ''} ${row.MODELO || ''}`.trim() || `Equipo ${tagId}`,
                                estado: row.ESTADO?.toUpperCase().includes('OPERATIVO') ? 'OPERATIVO' : 'MANTENIMIENTO',
                                marca: row.MARCA || '-', modelo: row.MODELO || '-', serie: row.SERIE || '-',
                                capacidad: row.CAPACIDAD_BTU ? `${row.CAPACIDAD_BTU} BTU` : '-',
                                lugarInstalacion: row.UBICACION || '-', drenaje: '-', refrigerante: '-', alimentacion: '-',
                                ultimoMantenimiento: row.FECHA_ULTIMO_MANTO || '-', proximoMantenimiento: '-',
                                observaciones: row.OBSERVACIONES || 'Sin observaciones', manualUrl: '#', fichaTecnica: '#', informeServicio: '#',
                                tipoServicio: row.TIPO_SERVICIO || 'Mantenimiento', observacionesDetalladas: []
                            };
                            agregarEventoLog(tagId, 'CREACIÓN', 'Importado desde Excel', null, equiposDB[tagId].estado);
                            agregarAlHistorial(tagId, 'Equipo importado desde Excel', 'importacion', 'admin');
                            importados++;
                        }
                    });
                    if (importados > 0) { showToast(`${importados} equipos importados`, 'success'); render(); }
                    else showToast("No se encontraron equipos válidos", 'error');
                };
                reader.readAsArrayBuffer(e.target.files[0]);
            }
        });
    }
}

function selectEquipo(tag) {
    state.currentTag = tag;
    state.currentEquipo = equiposDB[tag];
    state.historial = historialDB[tag] || [];
    state.activeTab = 'dashboard';
    window.history.pushState({}, '', `?tag=${tag}`);
    render();
}

// ============================================================
// 13. INICIALIZACIÓN - Verificar URL al cargar
// ============================================================
function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const tagParam = urlParams.get('tag');
    if (tagParam && equiposDB[tagParam]) {
        // Si hay tag en URL, no autenticamos automáticamente, esperamos login
        state.pendingTag = tagParam;
    }
    render();
}

init();
</script>
</body>
</html>
