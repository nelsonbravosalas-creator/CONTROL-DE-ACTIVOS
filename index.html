<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NBYB - Control de Activos Industrial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5);}50%{box-shadow:0 0 0 6px rgba(34,197,94,0);} }
        @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.6);}50%{box-shadow:0 0 0 8px rgba(239,68,68,0);} }
        @keyframes pulse-amber { 0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0.5);}50%{box-shadow:0 0 0 6px rgba(245,158,11,0);} }
        .pulse-operativo { animation: pulse-green 1.8s infinite; }
        .pulse-falla { animation: pulse-red 1.2s infinite; }
        .pulse-mantenimiento { animation: pulse-amber 1.8s infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        select { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.2em; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }
        .metric-card { transition: transform 0.2s; cursor: pointer; }
        .metric-card:active { transform: scale(0.97); }
        .modal-content { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .estado-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
        .estado-operativo { background: rgba(34,197,94,0.2); color: #4ade80; border: 1px solid rgba(34,197,94,0.5); }
        .estado-falla { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.5); }
        .estado-mantenimiento { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.5); }
        .estado-observacion { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.5); }
        .metric-premium-card { transition: all 0.2s; }
        .metric-premium-card:hover { transform: translateY(-2px); }
        /* Estilo sin bordes para inventario */
        .no-border-card {
            border: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        .inventory-table-container {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 1rem;
            padding: 0.5rem;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 text-slate-100">
<div id="root" class="max-w-md mx-auto relative min-h-screen"></div>

<script>
// ============================================================
// 1. CONFIGURACIÓN GLOBAL Y STORAGE
// ============================================================
let appPin = "1234";          // PIN de acceso normal
const ADMIN_PIN = "9576";     // PIN administrador
let equiposDB = {};
let historialDB = {};
let nextId = {};
let ticketsDB = {};
let ticketsHistory = [];
let nextTicketNumber = 1;
let customFields = [];
let informeFiltros = { tipo: 'TODO', valor: '' };

// Estado global de la UI
let state = {
    lotoAccepted: false,
    activeTab: 'dashboard',
    currentTag: null,
    currentEquipo: null,
    historial: [],
    userProfile: 'basic'
};

function loadFromLocalStorage() {
    const storedPin = localStorage.getItem('appPin');
    if (storedPin) appPin = storedPin;
    const storedEquipos = localStorage.getItem('equiposDB');
    if (storedEquipos) equiposDB = JSON.parse(storedEquipos);
    const storedHistorial = localStorage.getItem('historialDB');
    if (storedHistorial) historialDB = JSON.parse(storedHistorial);
    const storedNextId = localStorage.getItem('nextId');
    if (storedNextId) nextId = JSON.parse(storedNextId);
    const storedTicketsDB = localStorage.getItem('ticketsDB');
    if (storedTicketsDB) ticketsDB = JSON.parse(storedTicketsDB);
    const storedTicketsHistory = localStorage.getItem('ticketsHistory');
    if (storedTicketsHistory) ticketsHistory = JSON.parse(storedTicketsHistory);
    const storedNextTicket = localStorage.getItem('nextTicketNumber');
    if (storedNextTicket) nextTicketNumber = parseInt(storedNextTicket);
    const storedCustomFields = localStorage.getItem('customFields');
    if (storedCustomFields) customFields = JSON.parse(storedCustomFields);
    else customFields = [];
}

function saveToLocalStorage() {
    localStorage.setItem('appPin', appPin);
    localStorage.setItem('equiposDB', JSON.stringify(equiposDB));
    localStorage.setItem('historialDB', JSON.stringify(historialDB));
    localStorage.setItem('nextId', JSON.stringify(nextId));
    localStorage.setItem('ticketsDB', JSON.stringify(ticketsDB));
    localStorage.setItem('ticketsHistory', JSON.stringify(ticketsHistory));
    localStorage.setItem('nextTicketNumber', nextTicketNumber.toString());
    localStorage.setItem('customFields', JSON.stringify(customFields));
}

function initDefaultData() {
    if (Object.keys(equiposDB).length === 0) {
        equiposDB = {
            'RM.14.001': { tag:'RM.14.001', nombre:'Compresor Atlas Copco GA37 VSD', estado:'OPERATIVO', marca:'Atlas Copco', modelo:'GA 37 VSD', serie:'ACP-8923', capacidad:'12000 BTU', lugarInstalacion:'Sala máquinas principal', drenaje:'Automático', refrigerante:'R134a', alimentacion:'380V', ultimoMantenimiento:'2026-02-02', proximoMantenimiento:'2026-08-02', observaciones:'Rutina lubricación completada.', manualUrl:'#', fichaTecnica:'#', informeServicio:'#', tipoServicio:'Mantenimiento Preventivo' },
            'V.BM.045': { tag:'V.BM.045', nombre:'Unidad HVAC Trane IntelliPak', estado:'OPERATIVO', marca:'Trane', modelo:'IntelliPak TSC', serie:'TNX-4412', capacidad:'24000 BTU', lugarInstalacion:'Techo norte BME', drenaje:'Bomba condensado', refrigerante:'R410A', alimentacion:'460V', ultimoMantenimiento:'2026-01-15', proximoMantenimiento:'2026-04-20', observaciones:'Filtros saturados', manualUrl:'#', fichaTecnica:'#', informeServicio:'#', tipoServicio:'Mantenimiento Correctivo' },
            'VI.PI.012': { tag:'VI.PI.012', nombre:'Motor WEG W22', estado:'OPERATIVO', marca:'WEG', modelo:'W22 315S/M', serie:'WEG-7765', capacidad:'75000 BTU', lugarInstalacion:'Extrusora línea 2', drenaje:'N/A', refrigerante:'Aire forzado', alimentacion:'480V', ultimoMantenimiento:'2026-01-05', proximoMantenimiento:'2026-03-01', observaciones:'Rodamiento dañado', manualUrl:'#', fichaTecnica:'#', informeServicio:'#', tipoServicio:'Inspección' },
            'RM.BM.089': { tag:'RM.BM.089', nombre:'Tablero Schneider', estado:'OPERATIVO', marca:'Schneider Electric', modelo:'Prisma P', serie:'SEP-2341', capacidad:'800 A', lugarInstalacion:'Sala eléctrica BME', drenaje:'N/A', refrigerante:'N/A', alimentacion:'380V', ultimoMantenimiento:'2026-03-20', proximoMantenimiento:'2026-06-20', observaciones:'Punto caliente barra B', manualUrl:'#', fichaTecnica:'#', informeServicio:'#', tipoServicio:'Inspección' },
            'RM.14.015': { tag:'RM.14.015', nombre:'Compresor Daikin VRV IV', estado:'OPERATIVO', marca:'Daikin', modelo:'VRV IV', serie:'DKV-5543', capacidad:'48000 BTU', lugarInstalacion:'Techo Edif. Admin', drenaje:'Bomba condensado', refrigerante:'R32', alimentacion:'380V', ultimoMantenimiento:'2026-03-25', proximoMantenimiento:'2026-09-25', observaciones:'Funcionando normal', manualUrl:'#', fichaTecnica:'#', informeServicio:'#', tipoServicio:'Preventivo' },
            'VI.BM.023': { tag:'VI.BM.023', nombre:'Ventilador Centrífugo', estado:'OPERATIVO', marca:'Soler & Palau', modelo:'CGT-40', serie:'SP-8821', capacidad:'15000 CFM', lugarInstalacion:'Sala calderas BME', drenaje:'N/A', refrigerante:'N/A', alimentacion:'220V', ultimoMantenimiento:'2026-02-10', proximoMantenimiento:'2026-05-10', observaciones:'Ruido excesivo', manualUrl:'#', fichaTecnica:'#', informeServicio:'#', tipoServicio:'Correctivo' },
            'RM.PI.034': { tag:'RM.PI.034', nombre:'Compresor de Aire', estado:'OPERATIVO', marca:'Ingersoll Rand', modelo:'SSR UP5', serie:'IR-4456', capacidad:'25000 BTU', lugarInstalacion:'Planta Industrial', drenaje:'Automático', refrigerante:'R134a', alimentacion:'440V', ultimoMantenimiento:'2026-03-10', proximoMantenimiento:'2026-06-10', observaciones:'Operación normal', manualUrl:'#', fichaTecnica:'#', informeServicio:'#', tipoServicio:'Preventivo' }
        };
        historialDB = {};
        for (let tag in equiposDB) {
            historialDB[tag] = [{ id:1, fecha:new Date().toLocaleString(), usuario:'sistema', accion:'Carga inicial', tipo:'admin' }];
            nextId[tag] = 2;
        }
        ticketsDB = {};
        ticketsHistory = [];
        nextTicketNumber = 1;
        saveToLocalStorage();
    }
}

// Funciones auxiliares (historial, estados, tickets)
function addHistoryEntry(tag, accion, usuario, tipo='admin') {
    if (!historialDB[tag]) historialDB[tag] = [];
    if (!nextId[tag]) nextId[tag] = 1;
    historialDB[tag].unshift({ id:nextId[tag]++, fecha:new Date().toLocaleString('es-CL'), usuario, accion, tipo });
    if (state.currentTag === tag) state.historial = historialDB[tag];
    saveToLocalStorage();
}

function setEquipoEstado(tag, nuevoEstado, usuario) {
    if (!equiposDB[tag] || equiposDB[tag].estado === nuevoEstado) return;
    const anterior = equiposDB[tag].estado;
    equiposDB[tag].estado = nuevoEstado;
    if (state.currentTag === tag && state.currentEquipo) state.currentEquipo.estado = nuevoEstado;
    addHistoryEntry(tag, `Cambio de estado: ${anterior} → ${nuevoEstado}`, usuario, 'admin');
    saveToLocalStorage();
    if (state.currentTag === tag) render();
}

function getCurrentUser() { return state.userProfile === 'advanced' ? 'ingenieria_sym' : 'tecnico'; }

function crearTicket(tag, descripcion) {
    if (ticketsDB[tag]) { showToast("Ya existe ticket abierto", "error"); return false; }
    const ticketId = `TKT-${String(nextTicketNumber++).padStart(3,'0')}`;
    const now = new Date().toLocaleString('es-CL');
    const usuario = getCurrentUser();
    ticketsDB[tag] = { id:ticketId, tag, description:descripcion, createdAt:now, createdBy:usuario, status:'open' };
    setEquipoEstado(tag, 'MANTENIMIENTO', usuario);
    addHistoryEntry(tag, `Ticket creado: ${ticketId} - ${descripcion}`, usuario, 'alerta');
    showToast(`✅ Ticket ${ticketId} creado. Equipo en MANTENIMIENTO.`, "success");
    saveToLocalStorage();
    render();
    return true;
}

function resolverTicket(tag, fechaEjecucion, servicioRealizado, informeLink) {
    const ticket = ticketsDB[tag];
    if (!ticket) { showToast("No hay ticket abierto", "error"); return false; }
    const usuario = getCurrentUser();
    const now = new Date().toLocaleString('es-CL');
    ticketsHistory.push({ ...ticket, closedAt:now, closedBy:usuario, resolution:{ fechaEjecucion, servicioRealizado, informeLink }, status:'closed' });
    delete ticketsDB[tag];
    setEquipoEstado(tag, 'OPERATIVO', usuario);
    addHistoryEntry(tag, `Ticket resuelto: ${ticket.id} - Servicio: ${servicioRealizado}`, usuario, 'mantenimiento');
    showToast(`✅ Ticket ${ticket.id} resuelto. Equipo OPERATIVO.`, "success");
    saveToLocalStorage();
    render();
    return true;
}

function obtenerCantidadTicketsAbiertos() { return Object.keys(ticketsDB).length; }

// Decodificación TAG
const decodeTag = (tag) => {
    const regionMap = { 'RM':'Metropolitana', 'V':'Valparaíso', 'VI':"O'Higgins" };
    const plantaMap = { '14':'Casa Matriz (14 de la fama)', 'BM':'BME La Vara 3310', 'PI':'Planta Industrial (La Vara 2700)', 'RA':'Rancagua', 'VM':'Viña del Mar' };
    const parts = tag.split('.');
    if (parts.length!==3) return { raw:tag, region:'Desconocido', planta:'Desconocida', correlativo:tag, ubicacionCompleta:'Ubicación no disponible' };
    const [rc, pc, corr] = parts;
    const region = regionMap[rc]||rc;
    const planta = plantaMap[pc]||pc;
    return { raw:tag, region, planta, correlativo:corr, ubicacionCompleta:`${region} - ${planta}` };
};
const getRegionFromTag = (tag) => { const p=tag.split('.'); if(p.length!==3) return 'Desconocido'; const m={'RM':'Metropolitana','V':'Valparaíso','VI':"O'Higgins"}; return m[p[0]]||p[0]; };

// Métricas
function calcularMTBF(tag) { const fallas = (historialDB[tag]||[]).filter(h=>h.accion.toLowerCase().includes('falla')||h.tipo==='alerta'); return fallas.length?Math.round(180/fallas.length):180; }
function calcularMTTR(tag) { const reps = (historialDB[tag]||[]).filter(h=>h.accion.toLowerCase().includes('repar')||h.accion.toLowerCase().includes('cambio')); return reps.length?Math.round((4+reps.length*0.5)*10)/10:2.5; }
function calcularDisponibilidad(mtbf,mttr) { if(!mtbf||!mttr) return 98.5; return Math.round((mtbf/(mtbf+mttr))*100*10)/10; }
function calcularRatioMantenimiento() { let p=0,c=0; Object.values(equiposDB).forEach(e=>{ if(e.tipoServicio?.toLowerCase().includes('preventivo')) p++; else if(e.tipoServicio?.toLowerCase().includes('correctivo')) c++; else if(e.estado==='OPERATIVO') p++; else if(e.estado==='EN FALLA') c++; else p++; }); const t=p+c; return { preventivos:t?Math.round((p/t)*100):80, correctivos:t?Math.round((c/t)*100):20 }; }
function equiposMantenimientoVencido() { const hoy=new Date(); return Object.values(equiposDB).filter(e=>e.proximoMantenimiento&&e.proximoMantenimiento!=='-'&&new Date(e.proximoMantenimiento)<hoy); }
function calcularTendencia() { let recientes=[]; Object.keys(historialDB).forEach(t=>{historialDB[t].forEach(ev=>{if(ev.fecha&&new Date(ev.fecha)>new Date(Date.now()-30*24*3600000)) recientes.push(ev);})}); const buenos=recientes.filter(h=>h.tipo==='admin'||h.accion.toLowerCase().includes('correcto')).length; const malos=recientes.filter(h=>h.tipo==='alerta'||h.accion.toLowerCase().includes('falla')).length; if(malos>buenos) return {tendencia:'↓',color:'text-red-400',mensaje:'Degradación',bg:'bg-red-950/30'}; if(buenos>malos+2) return {tendencia:'↑',color:'text-green-400',mensaje:'Mejorando',bg:'bg-green-950/30'}; return {tendencia:'→',color:'text-yellow-400',mensaje:'Estable',bg:'bg-yellow-950/30'}; }
function calcularCumplimiento() { const conManto=Object.values(equiposDB).filter(e=>e.ultimoMantenimiento&&e.ultimoMantenimiento!=='-').length; return Math.round((conManto/Object.keys(equiposDB).length)*100); }
function obtenerAlertasCriticas() { const alertas=[]; const vencidos=equiposMantenimientoVencido(); const falla=Object.values(equiposDB).filter(e=>e.estado==='EN FALLA'); if(vencidos.length) alertas.push({tipo:'⚠️',mensaje:`${vencidos.length} equipo(s) con mant. vencido`,color:'text-red-400'}); if(falla.length) alertas.push({tipo:'🔴',mensaje:`${falla.length} equipo(s) EN FALLA`,color:'text-red-400'}); return alertas; }
function calcularMetricas() { const vals=Object.values(equiposDB); return { total:vals.length, operativos:vals.filter(e=>e.estado==='OPERATIVO').length, falla:vals.filter(e=>e.estado==='EN FALLA').length, observaciones:vals.filter(e=>e.estado==='Con Observaciones').length }; }

function mostrarEquiposPorEstado(estado, titulo, color) {
    const lista = estado ? Object.values(equiposDB).filter(e=>e.estado===estado) : Object.values(equiposDB);
    if(!lista.length){ showToast(`No hay equipos`,'info'); return; }
    const modal=document.createElement('div'); modal.className='fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4';
    modal.innerHTML=`<div class="bg-slate-800 rounded-2xl max-w-md w-full max-h-[85vh] flex flex-col border border-slate-600 shadow-2xl modal-content"><div class="p-4 border-b border-slate-700 flex justify-between items-center sticky top-0 bg-slate-800"><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full ${color} flex items-center justify-center"><i data-lucide="list"></i></div><h3 class="text-lg font-bold">${titulo}</h3><span class="text-xs bg-slate-700 px-2 py-0.5 rounded-full">${lista.length}</span></div><button id="closeListaModalBtn" class="p-1 rounded-full bg-slate-700 hover:bg-slate-600">✕</button></div><div class="flex-1 overflow-y-auto p-3 space-y-2">${lista.map(e=>`<div class="equipo-lista-item bg-slate-700/50 rounded-xl p-3 cursor-pointer hover:bg-slate-600" data-tag="${e.tag}"><div class="flex justify-between"><div><p class="font-mono font-bold text-sm">${e.tag}</p><p class="text-xs">${e.marca} ${e.modelo}</p></div><div class="w-2 h-2 rounded-full ${e.estado==='OPERATIVO'?'bg-green-500':e.estado==='EN FALLA'?'bg-red-500':e.estado==='MANTENIMIENTO'?'bg-amber-500':'bg-blue-500'}"></div></div><div class="grid grid-cols-2 gap-1 mt-2 text-[11px] text-slate-400"><div><i data-lucide="map-pin" class="w-3 h-3 inline"></i> ${e.lugarInstalacion||'-'}</div><div><i data-lucide="calendar"></i> Últ: ${e.ultimoMantenimiento||'-'}</div><div><i data-lucide="zap"></i> Pot: ${e.capacidad||'-'}</div><div class="col-span-2"><i data-lucide="clipboard-list"></i> ${e.observaciones?.substring(0,50)}${e.observaciones?.length>50?'...':''}</div></div></div>`).join('')}</div><div class="p-3 border-t border-slate-700 text-center text-[10px]">Haz clic para ver detalles</div></div>`;
    document.body.appendChild(modal); lucide.createIcons();
    const cerrar=()=>modal.remove();
    document.getElementById('closeListaModalBtn')?.addEventListener('click',cerrar);
    modal.addEventListener('click',e=>{if(e.target===modal)cerrar();});
    document.querySelectorAll('.equipo-lista-item').forEach(item=>{item.addEventListener('click',()=>{const tag=item.dataset.tag; if(tag&&equiposDB[tag]){ selectEquipo(tag); cerrar(); }});});
}

// ============================================================
// 3. GESTIÓN DE COLUMNAS PERSONALIZADAS (ADMIN)
// ============================================================
function mostrarGestionColumnas() {
    const modal=document.createElement('div'); modal.className='fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4';
    let fieldsHtml='';
    if(customFields.length===0) fieldsHtml='<p class="text-slate-400 text-sm">No hay campos personalizados.</p>';
    else{
        fieldsHtml='<div class="space-y-2">';
        customFields.forEach((cf,idx)=>{
            fieldsHtml+=`<div class="flex gap-2 items-center bg-slate-700/50 p-2 rounded-xl"><input type="text" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg p-1 text-sm" value="${cf.fieldLabel}" data-index="${idx}" data-field="label" placeholder="Etiqueta"><input type="text" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg p-1 text-sm" value="${cf.fieldKey}" data-index="${idx}" data-field="key" placeholder="clave"><button class="eliminarCampoBtn bg-red-600/70 hover:bg-red-600 px-2 py-1 rounded-lg text-xs" data-index="${idx}">✕</button></div>`;
        });
        fieldsHtml+='</div>';
    }
    modal.innerHTML=`<div class="bg-slate-800 rounded-2xl p-5 max-w-md w-full border border-slate-600 shadow-2xl modal-content"><div class="flex justify-between items-center mb-4"><h3 class="text-xl font-bold flex gap-2"><i data-lucide="table-properties"></i> Columnas Personalizadas</h3><button id="closeModalBtn" class="p-1 rounded-full bg-slate-700">✕</button></div><div class="mb-4"><label class="text-sm">Nueva columna</label><div class="flex gap-2 mt-1"><input id="newFieldLabel" placeholder="Ej: Tecnología compresor" class="flex-1 bg-slate-700 rounded-xl p-2 text-sm"><input id="newFieldKey" placeholder="clave (ej: tec_comp)" class="flex-1 bg-slate-700 rounded-xl p-2 text-sm"><button id="addFieldBtn" class="bg-cyan-600 px-3 rounded-xl">➕</button></div></div><div class="mb-4"><label class="text-sm">Campos actuales</label><div id="camposList">${fieldsHtml}</div></div><div class="flex gap-3"><button id="saveFieldsBtn" class="flex-1 bg-emerald-600 py-2 rounded-xl">💾 Guardar</button><button id="cancelModalBtn" class="flex-1 bg-slate-700 py-2 rounded-xl">Cerrar</button></div></div>`;
    document.body.appendChild(modal); lucide.createIcons();
    const cerrar=()=>modal.remove();
    document.getElementById('closeModalBtn')?.addEventListener('click',cerrar);
    document.getElementById('cancelModalBtn')?.addEventListener('click',cerrar);
    document.getElementById('addFieldBtn')?.addEventListener('click',()=>{
        let label=document.getElementById('newFieldLabel').value.trim();
        let key=document.getElementById('newFieldKey').value.trim();
        if(!label){ showToast("Ingrese etiqueta","error"); return; }
        if(!key) key=label.toLowerCase().replace(/ /g,'_').normalize("NFD").replace(/[\u0300-\u036f]/g,"");
        if(customFields.some(f=>f.fieldKey===key)){ showToast("Clave ya existe","error"); return; }
        customFields.push({fieldKey:key, fieldLabel:label});
        Object.keys(equiposDB).forEach(tag=>{ if(equiposDB[tag][key]===undefined) equiposDB[tag][key]=''; });
        saveToLocalStorage();
        mostrarGestionColumnas();
    });
    document.querySelectorAll('.eliminarCampoBtn').forEach(btn=>{
        btn.addEventListener('click',(e)=>{
            const idx=parseInt(btn.dataset.index);
            if(!isNaN(idx)){
                const removed=customFields.splice(idx,1)[0];
                Object.keys(equiposDB).forEach(tag=>{ delete equiposDB[tag][removed.fieldKey]; });
                saveToLocalStorage();
                mostrarGestionColumnas();
            }
        });
    });
    document.getElementById('saveFieldsBtn')?.addEventListener('click',()=>{
        document.querySelectorAll('[data-field="label"]').forEach(inp=>{ const idx=parseInt(inp.dataset.index); if(!isNaN(idx)) customFields[idx].fieldLabel=inp.value; });
        document.querySelectorAll('[data-field="key"]').forEach(inp=>{ const idx=parseInt(inp.dataset.index); if(!isNaN(idx)) customFields[idx].fieldKey=inp.value; });
        saveToLocalStorage();
        showToast("Campos guardados","success");
        cerrar();
        render();
    });
}

// ============================================================
// 4. IMPORTAR/EXPORTAR EXCEL (CON CAMPOS PERSONALIZADOS)
// ============================================================
function exportarInventarioExcel() {
    const equipos=Object.values(equiposDB);
    const baseCols=['TAG_ID','REGIÓN','UBICACIÓN','MARCA','MODELO','ESTADO','CAPACIDAD_BTU','SERIE','ÚLTIMO MANTENIMIENTO','PRÓXIMO MANTENIMIENTO','REFRIGERANTE','OBSERVACIONES'];
    const customCols=customFields.map(cf=>cf.fieldLabel);
    const allCols=[...baseCols,...customCols];
    const data=equipos.map(e=>{
        const row={
            'TAG_ID':e.tag, 'REGIÓN':getRegionFromTag(e.tag), 'UBICACIÓN':e.lugarInstalacion, 'MARCA':e.marca, 'MODELO':e.modelo,
            'ESTADO':e.estado, 'CAPACIDAD_BTU':e.capacidad, 'SERIE':e.serie, 'ÚLTIMO MANTENIMIENTO':e.ultimoMantenimiento,
            'PRÓXIMO MANTENIMIENTO':e.proximoMantenimiento, 'REFRIGERANTE':e.refrigerante, 'OBSERVACIONES':e.observaciones, 'TECNICO':e.Tecnico     
        };
        customFields.forEach(cf=>{ row[cf.fieldLabel]=e[cf.fieldKey]||''; });
        return row;
    });
    const ws=XLSX.utils.json_to_sheet(data,{header:allCols});
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Inventario");
    XLSX.writeFile(wb,`inventario_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast("Exportado","success");
}

function importarExcel(file) {
    const reader=new FileReader();
    reader.onload=function(e){
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const sheet=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(sheet);
        let importados=0;
        rows.forEach(row=>{
            const tagId=row.TAG_ID||row['TAG_ID'];
            if(!tagId) return;
            const nuevoEquipo={
                tag:tagId, nombre:`${row.MARCA||''} ${row.MODELO||''}`.trim()||`Equipo ${tagId}`,
                estado:mapearEstado(row.ESTADO), marca:row.MARCA||'-', modelo:row.MODELO||'-', serie:row.SERIE||'-',
                capacidad:row.CAPACIDAD_BTU?`${row.CAPACIDAD_BTU} BTU`:'-', lugarInstalacion:row.UBICACION||'-',
                drenaje:row.DRENAJE||'-', refrigerante:row.REFRIGERANTE||'-', alimentacion:'-',
                ultimoMantenimiento:formatearFecha(row['ÚLTIMO MANTENIMIENTO']||row.FECHA_ULTIMO_MANTO),
                proximoMantenimiento:formatearFecha(row['PRÓXIMO MANTENIMIENTO']||row.PROXIMO_MANTO),
                observaciones:row.OBSERVACIONES||'Sin observaciones', manualUrl:row.MANUAL_URL||'#', fichaTecnica:row.FICHA_URL||'#', informeServicio:'#', tipoServicio:row.TIPO_SERVICIO||'Mantenimiento'
            };
            customFields.forEach(cf=>{ nuevoEquipo[cf.fieldKey]=row[cf.fieldLabel]||''; });
            equiposDB[tagId]=nuevoEquipo;
            if(!historialDB[tagId]) historialDB[tagId]=[];
            if(!nextId[tagId]) nextId[tagId]=1;
            historialDB[tagId].unshift({ id:nextId[tagId]++, fecha:new Date().toLocaleString(), usuario:'importacion', accion:'Actualizado desde Excel', tipo:'admin' });
            importados++;
        });
        if(importados>0){ saveToLocalStorage(); showToast(`✅ ${importados} equipos importados/actualizados`,'success'); render(); }
        else showToast('⚠️ No se encontraron equipos válidos','error');
    };
    reader.readAsArrayBuffer(file);
}
function mapearEstado(s){ const u=String(s||'').toUpperCase(); if(u.includes('OPERATIVO')) return 'OPERATIVO'; if(u.includes('FALLA')) return 'EN FALLA'; if(u.includes('MANTENIMIENTO')) return 'MANTENIMIENTO'; return 'Con Observaciones'; }
function formatearFecha(f){ if(!f) return '-'; if(typeof f==='string' && f.includes('-')){ const p=f.split('-'); if(p.length===3) return `${p[2]}-${p[1]}-${p[0]}`; } return f; }
function descargarPlantillaExcel(){
    const baseCols=['TAG_ID','TIPO_SERVICIO','FECHA_ULTIMO_MANTO','UBICACION','MARCA','MODELO','SERIE','ESTADO','CAPACIDAD_BTU','DRENAJE','MANUAL_URL','FICHA_URL','OBSERVACIONES','REFRIGERANTE','TECNICO'];
    const customCols=customFields.map(cf=>cf.fieldLabel);
    const allCols=[...baseCols,...customCols];
    const ejemplo={}; allCols.forEach(c=>ejemplo[c]='');
    ejemplo.TAG_ID='RM.14.002'; ejemplo.MARCA='Ejemplo';
    const ws=XLSX.utils.json_to_sheet([ejemplo],{header:allCols});
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Plantilla");
    XLSX.writeFile(wb,"plantilla_equipos_nbyb.xlsx");
    showToast("Plantilla descargada","success");
}

function attachEvents() {
    document.getElementById('acceptLotoBtn')?.addEventListener('click', () => { state.lotoAccepted = true; render(); });
    document.querySelectorAll('.navBtn').forEach(btn => btn.addEventListener('click', () => { state.activeTab = btn.dataset.tab; render(); }));
    document.getElementById('fabScanBtn')?.addEventListener('click', () => handleScan());
    document.getElementById('scanQrEmptyBtn')?.addEventListener('click', () => handleScan());
    document.getElementById('advancedLoginBtn')?.addEventListener('click', () => {
        const pwd = prompt("🔐 Clave de Ingeniería SYM:");
        if (pwd === "SYM2025") { state.userProfile = 'advanced'; showToast("✅ Modo avanzado activado", "success"); render(); }
        else if (pwd) showToast("❌ Clave incorrecta", "error");
    });
    document.querySelectorAll('.metric-card').forEach(card => {
        card.addEventListener('click', () => {
            const metrica = card.dataset.metrica, estado = card.dataset.estado;
            if (metrica === 'total') mostrarEquiposPorEstado(null, '📊 Todos', 'bg-cyan-500/20');
            else if (estado === 'OPERATIVO') mostrarEquiposPorEstado('OPERATIVO', '🟢 Operativos', 'bg-green-500/20');
            else if (estado === 'EN FALLA') mostrarEquiposPorEstado('EN FALLA', '🔴 En Falla', 'bg-red-500/20');
            else if (estado === 'Con Observaciones') mostrarEquiposPorEstado('Con Observaciones', '🔵 Observaciones', 'bg-blue-500/20');
        });
    });
    document.getElementById('verHistorialTicketsBtn')?.addEventListener('click', () => { state.activeTab = 'informes'; render(); });
    const filtroTipo = document.getElementById('filtroTipo'), filtroValor = document.getElementById('filtroValor'), limpiar = document.getElementById('limpiarFiltrosBtn'), exportar = document.getElementById('exportarInventarioBtn');
    if (filtroTipo) filtroTipo.addEventListener('change', e => { informeFiltros.tipo = e.target.value; render(); });
    if (filtroValor) filtroValor.addEventListener('input', e => { informeFiltros.valor = e.target.value; render(); });
    if (limpiar) limpiar.addEventListener('click', () => { informeFiltros = { tipo: 'TODO', valor: '' }; render(); });
    if (exportar) exportar.addEventListener('click', () => exportarInventarioExcel());
    
    // Eventos para las filas de la tabla (navegación)
    document.querySelectorAll('.equipo-row').forEach(row => {
        row.addEventListener('click', (e) => {
            // Evitar que el clic en los botones de acción dispare la navegación
            if (e.target.closest('.action-edit') || e.target.closest('.action-copy') || e.target.closest('.action-delete')) return;
            const tag = row.dataset.tag;
            if (tag && equiposDB[tag]) selectEquipo(tag);
        });
    });
    
    // Botones de acción: Editar, Copiar, Eliminar (requieren PIN 9576)
    document.querySelectorAll('.action-edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const tag = btn.dataset.tag;
            if (!tag) return;
            if (prompt("Ingrese PIN de Administrador para editar:") !== ADMIN_PIN) { showToast("PIN incorrecto", "error"); return; }
            mostrarEditarEquipo(tag);
        });
    });
    document.querySelectorAll('.action-copy').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const tag = btn.dataset.tag;
            if (!tag) return;
            if (prompt("Ingrese PIN de Administrador para copiar:") !== ADMIN_PIN) { showToast("PIN incorrecto", "error"); return; }
            copiarEquipo(tag);
        });
    });
    document.querySelectorAll('.action-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const tag = btn.dataset.tag;
            if (!tag) return;
            if (prompt("Ingrese PIN de Administrador para eliminar:") !== ADMIN_PIN) { showToast("PIN incorrecto", "error"); return; }
            if (confirm(`¿Eliminar equipo ${tag}? Esta acción es irreversible.`)) {
                eliminarEquipo(tag);
            }
        });
    });
    
    // Otros botones (tickets, etc.)
    document.getElementById('levantarTicketBtn')?.addEventListener('click', () => mostrarModalCrearTicket());
    document.getElementById('resolverTicketBtn')?.addEventListener('click', () => mostrarModalResolverTicket());
    document.getElementById('cambiarEstadoBtn')?.addEventListener('click', () => mostrarModalEstadoManual());
    document.getElementById('editObservacionesBtn')?.addEventListener('click', () => {
        if (state.currentEquipo) {
            const newObs = prompt("Editar observaciones:", state.currentEquipo.observaciones);
            if (newObs && newObs !== state.currentEquipo.observaciones) {
                state.currentEquipo.observaciones = newObs;
                equiposDB[state.currentTag].observaciones = newObs;
                addHistoryEntry(state.currentTag, 'Actualización de observaciones', getCurrentUser(), 'admin');
                render();
            }
        }
    });
    document.getElementById('gestionarColumnasBtn')?.addEventListener('click', () => {
        const pwd = prompt("🔐 Ingrese PIN de Administrador (9576):");
        if (pwd === ADMIN_PIN) mostrarGestionColumnas();
        else if (pwd) showToast("PIN incorrecto", "error");
    });
    document.getElementById('cambiarPinBtn')?.addEventListener('click', () => {
        const pwd = prompt("🔐 Ingrese PIN de Administrador (9576):");
        if (pwd === ADMIN_PIN) {
            const newPin = prompt("Nuevo PIN de acceso (4 dígitos):", appPin);
            if (newPin && /^\d{4}$/.test(newPin)) { appPin = newPin; saveToLocalStorage(); showToast(`PIN cambiado a ${newPin}`, "success"); }
            else if (newPin) showToast("Debe tener 4 dígitos", "error");
        } else if (pwd) showToast("PIN administrador incorrecto", "error");
    });
    document.getElementById('editCurrentEquipoBtn')?.addEventListener('click', () => {
        if (state.currentEquipo) {
            const newObs = prompt("Editar observaciones:", state.currentEquipo.observaciones);
            if (newObs) { state.currentEquipo.observaciones = newObs; equiposDB[state.currentTag].observaciones = newObs; saveToLocalStorage(); render(); }
        }
    });
    document.getElementById('createNewEquipoBtn')?.addEventListener('click', () => {
        const newTag = prompt("Nuevo TAG (ej: RM.14.002):");
        if (newTag && !equiposDB[newTag]) {
            const nuevo = { tag: newTag, nombre: "Nuevo Equipo", estado: "OPERATIVO", marca: "-", modelo: "-", serie: "-", capacidad: "-", lugarInstalacion: "-", drenaje: "-", refrigerante: "-", alimentacion: "-", ultimoMantenimiento: new Date().toISOString().slice(0, 10), proximoMantenimiento: "-", observaciones: "Creado desde app", manualUrl: "#", fichaTecnica: "#", informeServicio: "#", tipoServicio: "Mantenimiento" };
            customFields.forEach(cf => { nuevo[cf.fieldKey] = ''; });
            equiposDB[newTag] = nuevo;
            historialDB[newTag] = [{ id: 1, fecha: new Date().toLocaleString(), usuario: getCurrentUser(), accion: "Equipo creado", tipo: "admin" }];
            nextId[newTag] = 2;
            saveToLocalStorage();
            selectEquipo(newTag);
            showToast(`✅ Equipo ${newTag} creado`, "success");
        } else if (newTag) showToast("❌ TAG ya existe", "error");
    });
    document.getElementById('generateQrBtn')?.addEventListener('click', () => { alert("📄 Simulación: etiqueta QR 8x5cm para " + (state.currentTag || "NUEVO")); });
    document.getElementById('downloadPlantillaBtn')?.addEventListener('click', () => descargarPlantillaExcel());
    const excelInput = document.getElementById('excelUploadInput');
    if (excelInput) excelInput.addEventListener('change', e => { if (e.target.files[0]) importarExcel(e.target.files[0]); });
}

function copiarEquipo(tag) {
    const original = equiposDB[tag];
    const newTag = prompt("Ingrese el nuevo TAG para la copia (ej: RM.14.099):");
    if (!newTag) return;
    if (equiposDB[newTag]) { showToast("El TAG ya existe", "error"); return; }
    const copia = JSON.parse(JSON.stringify(original));
    copia.tag = newTag;
    copia.nombre = `${copia.nombre} (copia)`;
    equiposDB[newTag] = copia;
    historialDB[newTag] = [{ id: 1, fecha: new Date().toLocaleString(), usuario: getCurrentUser(), accion: "Equipo copiado desde " + tag, tipo: "admin" }];
    nextId[newTag] = 2;
    saveToLocalStorage();
    showToast(`Equipo copiado como ${newTag}`, "success");
    render();
}

function eliminarEquipo(tag) {
    delete equiposDB[tag];
    delete historialDB[tag];
    delete nextId[tag];
    delete ticketsDB[tag];
    // No eliminar ticketsHistory, se mantiene histórico
    if (state.currentTag === tag) {
        state.currentTag = null;
        state.currentEquipo = null;
        state.historial = [];
    }
    saveToLocalStorage();
    showToast(`Equipo ${tag} eliminado`, "success");
    render();
}

function selectEquipo(tag) { state.currentTag = tag; state.currentEquipo = equiposDB[tag]; state.historial = historialDB[tag] || []; state.activeTab = 'dashboard'; window.history.pushState({}, '', `?tag=${tag}`); render(); }

    const modal = document.createElement('div'); modal.className = 'fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4';
    modal.innerHTML = `<div class="bg-slate-800 rounded-2xl p-6 max-w-sm w-full border border-slate-600 shadow-2xl"><div class="flex justify-between mb-4"><h3 class="text-xl font-bold">Cambiar Estado</h3><button id="closeModalBtn" class="p-1 rounded-full bg-slate-700">✕</button></div><select id="estadoSelect" class="w-full bg-slate-700 rounded-xl p-3 mb-4"><option value="OPERATIVO">🟢 OPERATIVO</option><option value="MANTENIMIENTO">🟡 MANTENIMIENTO</option><option value="EN FALLA">🔴 EN FALLA</option><option value="Con Observaciones">🔵 CON OBSERVACIONES</option></select><div class="flex gap-3"><button id="confirmarEstadoBtn" class="flex-1 bg-cyan-600 py-2 rounded-xl">Cambiar</button><button id="cancelarModalBtn" class="flex-1 bg-slate-700 py-2 rounded-xl">Cancelar</button></div></div>`;
    document.body.appendChild(modal); lucide.createIcons();
    const cerrar = () => modal.remove();
    document.getElementById('closeModalBtn')?.addEventListener('click', cerrar);
    document.getElementById('cancelarModalBtn')?.addEventListener('click', cerrar);
    document.getElementById('confirmarEstadoBtn')?.addEventListener('click', () => {
        const ns = document.getElementById('estadoSelect').value;
        setEquipoEstado(state.currentTag, ns, getCurrentUser());
        cerrar();
        render();
    });
}

// Pantalla de PIN y arranque
function showPinScreen() {
    const root = document.getElementById('root');
    root.innerHTML = `<div class="flex flex-col items-center justify-center min-h-screen p-6"><div class="bg-slate-800 rounded-3xl p-8 w-full max-w-sm border border-slate-700 shadow-2xl"><div class="w-20 h-20 mx-auto bg-gradient-to-br from-cyan-500 to-blue-600 rounded-2xl flex items-center justify-center mb-6"><i data-lucide="qrcode" class="w-10 h-10 text-white"></i></div><h2 class="text-2xl font-bold text-center mb-2">Acceso Industrial</h2><p class="text-slate-400 text-center text-sm mb-6">Ingrese clave de seguridad</p><input type="password" id="pinInput" maxlength="4" inputmode="numeric" class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 text-center text-2xl tracking-[0.5rem] font-mono focus:ring-2 focus:ring-cyan-500 outline-none" placeholder="••••"><button id="verifyPinBtn" class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 py-3.5 rounded-2xl font-semibold mt-6 flex items-center justify-center gap-2"><i data-lucide="unlock"></i> Validar acceso</button><p class="text-center text-xs text-slate-500 mt-6">Elaborado por N. Bravo · Ingeniería y Servicios Bravo Spa</p></div></div>`;
    lucide.createIcons();
    document.getElementById('verifyPinBtn')?.addEventListener('click', () => {
        const pin = document.getElementById('pinInput').value;
        if (pin === appPin) {
            state.lotoAccepted = true;
            state.userProfile = 'basic';
            render();
        } else showToast("PIN incorrecto", "error");
    });
}

// Cargar datos y arrancar
loadFromLocalStorage();
initDefaultData();
if (!state.lotoAccepted) showPinScreen();
else render();
</script>
